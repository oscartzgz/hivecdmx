services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: base
    command: bash -c "bundle install && bin/rails server -b 0.0.0.0 -p 4000"
    volumes:
      - .:/rails
      - gems:/bundle
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      RAILS_ENV: development

volumes:
  postgres_data:
  gems:
