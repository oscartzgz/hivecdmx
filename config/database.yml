default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV["DATABASE_URL"] %>

development:
  <<: *default
  database: hive_development

test:
  <<: *default
  database: hive_test
  url: <%= ENV.fetch("TEST_DATABASE_URL", ENV["DATABASE_URL"]&.sub("hive_development", "hive_test")) %>

production:
  <<: *default
  database: hive_production
